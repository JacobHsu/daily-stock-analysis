name: 每日股票分析

on:
  # 定時觸發 - 每天台灣時間 22:00 (UTC 14:00)
  schedule:
    - cron: '0 14 * * 1-5'     # 週一到週五，UTC 14:00 = 台灣時間 22:00

  # 手動觸發
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票+大盤）
          - market-only   # 僅大盤復盤
          - stocks-only   # 僅股票分析
      force_run:
        description: '強制執行（跳過交易日檢查）'
        required: false
        default: false
        type: boolean

# 並發控制：同一時間只執行一個分析任務
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 隨機延遲（避免固定時間存取）
        run: sleep $((RANDOM % 60))

      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 建立必要目錄
        run: |
          mkdir -p data logs reports

      - name: 執行股票分析
        env:
          # ==========================================
          # AI 設定
          # ==========================================
          # Gemini AI（主選）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-3-flash-preview' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'

          # AIHubMix（優先於 OPENAI_API_KEY，自動適配 base_url）
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI 相容 API（備選）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL }}

          # Anthropic / Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}

          # ==========================================
          # 搜尋服務
          # ==========================================
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}

          # ==========================================
          # 通知管道（可同時設定多個，全部推送）
          # ==========================================

          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

          # 電子郵件
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || '美股分析助手' }}

          # Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}

          # PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

          # 自訂 Webhook（Bark、自建服務等）
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}

          # Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}

          # AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # ==========================================
          # 自選股設定
          # ==========================================
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'AAPL' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'us' }}

          # ==========================================
          # 執行設定
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          # ==========================================
          # 系統設定
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: 'false'

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"

          echo "=========================================="
          echo "🚀 美股自選股智慧分析系統"
          echo "=========================================="
          echo "⏰ 時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 執行模式: $MODE"
          echo "📊 自選股: $STOCK_LIST"
          echo "📝 報告類型: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 設定檢查"
          echo "=========================================="
          echo "【AI 設定】"
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ 已設定' || echo '❌ 未設定')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo ""
          echo "【搜尋引擎】"
          echo "  Bocha API Keys:  $([ -n "$BOCHA_API_KEYS" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo ""
          echo "【通知管道】"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  Discord:  $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "  AstrBot:  $([ -n "$ASTRBOT_URL" ] && echo '✅ 已設定' || echo '⚪ 未設定')"
          echo "=========================================="
          echo ""

          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 已啟用強制執行模式（跳過交易日檢查）"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 上傳分析報告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 顯示執行結果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "產生的報告:"
            ls -la reports/
          else
            echo "⚠️ 未產生報告檔案"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 最近日誌（最後 30 行）:"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "無日誌"
          fi
